# ============================================================
# AfriBiz Intelligence — HAProxy Load Balancer Configuration
# Deploy this on Lb01 (3.89.88.69)
# File: /etc/haproxy/haproxy.cfg  (append to existing global/defaults)
# ============================================================

global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

# ============================================================
# FRONTEND — accepts incoming HTTP traffic on port 80
# ============================================================
frontend afribiz_front
    bind *:80
    default_backend afribiz_servers

    # Add X-Forwarded-For header so web servers know real client IP
    option forwardfor

    # Health check endpoint — returns 200 OK directly from LB
    acl is_health path /health
    http-request return status 200 content-type text/plain string "OK" if is_health

# ============================================================
# BACKEND — distributes traffic to Web01 and Web02
# ============================================================
backend afribiz_servers
    balance roundrobin

    # Active health checks — poll GET / every 5s
    option httpchk GET /
    http-check expect status 200

    # Web servers — replace IPs if they change
    server web01 52.70.87.10:80 check inter 5000 rise 2 fall 3
    server web02 3.93.218.74:80 check inter 5000 rise 2 fall 3

# ============================================================
# STATS PAGE — monitor load balancer at http://LB_IP:8404/stats
# ============================================================
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-legends
    stats show-node
