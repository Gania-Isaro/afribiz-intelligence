# ============================================================
# AfriBiz Intelligence — HAProxy Load Balancer Configuration
# Deploy this on Lb01 (3.89.88.69)
# Domain: afribiz-intelligence.gania.tech
# File: /etc/haproxy/haproxy.cfg  (replace the entire file)
# ============================================================

global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

    # TLS hardening — strong ciphers, TLS 1.2 minimum, no session tickets
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets
    ssl-default-server-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-server-options ssl-min-ver TLSv1.2 no-tls-tickets

    # Limit max connections globally
    maxconn 50000

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    option  http-server-close
    timeout connect 5000ms
    timeout client  30000ms
    timeout server  30000ms
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

# ============================================================
# FRONTEND — HTTP on port 80, redirect everything to HTTPS
# Let's Encrypt ACME challenge is exempted from the redirect
# ============================================================
frontend afribiz_http
    bind *:80

    # Allow Let's Encrypt certificate renewal challenges through
    acl is_acme path_beg /.well-known/acme-challenge/
    http-request return status 200 content-type text/plain string "OK" if is_acme

    # Redirect all other HTTP traffic to HTTPS (301 permanent)
    http-request redirect scheme https code 301 if !is_acme

# ============================================================
# FRONTEND — HTTPS on port 443 (main entry point)
# Certificate: /etc/haproxy/certs/afribiz.pem
# (generated by certbot — see deployment instructions)
# ============================================================
frontend afribiz_https
    bind *:443 ssl crt /etc/haproxy/certs/afribiz.pem alpn h2,http/1.1

    # ---- Rate limiting ----
    stick-table type ip size 100k expire 10s store http_req_rate(10s)
    http-request track-sc0 src
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 100 }

    # ---- Block common attack paths ----
    http-request deny if { req.hdr(host) -m str "" }
    acl attack_uri path_beg /wp-admin /wp-login /phpmyadmin /.env /admin.php /xmlrpc.php
    http-request deny deny_status 403 if attack_uri
    http-request deny if { req.hdr_cnt(host) gt 1 }

    # ---- Security response headers ----
    http-response set-header X-Frame-Options "SAMEORIGIN"
    http-response set-header X-Content-Type-Options "nosniff"
    http-response set-header X-XSS-Protection "1; mode=block"
    http-response set-header Referrer-Policy "strict-origin-when-cross-origin"
    http-response set-header Permissions-Policy "camera=(), microphone=(), geolocation=()"
    # HSTS — tells browsers to always use HTTPS for 1 year
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains"
    # Strip server fingerprinting
    http-response del-header Server
    http-response del-header X-Powered-By

    # ---- Health check endpoint ----
    acl is_health path /health
    http-request return status 200 content-type text/plain string "OK" if is_health

    default_backend afribiz_servers

# ============================================================
# BACKEND — distributes traffic to Web01 and Web02
# ============================================================
backend afribiz_servers
    balance roundrobin

    # Active health checks — poll GET / every 5s
    option httpchk GET /
    http-check expect status 200

    # Web servers
    server web01 52.70.87.10:80 check inter 5000 rise 2 fall 3
    server web02 3.93.218.74:80 check inter 5000 rise 2 fall 3

# ============================================================
# STATS PAGE — password protected, localhost only
# Access via SSH tunnel: ssh -L 8404:127.0.0.1:8404 ubuntu@<LB_IP>
# Then visit: http://127.0.0.1:8404/stats
# ============================================================
listen stats
    bind 127.0.0.1:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-legends
    stats show-node
    stats auth admin:CHANGE_THIS_PASSWORD
