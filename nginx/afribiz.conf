# ============================================================
# AfriBiz Intelligence — Nginx Server Configuration
# Deploy this to both Web01 and Web02.
# File: /etc/nginx/sites-available/afribiz
# ============================================================

server {
    listen 80;
    listen [::]:80;

    # Accept any hostname — update with your domain if you have one
    server_name _;

    # Document root — where your files live on the server
    root /var/www/afribiz-intelligence;
    index index.html;

    # ---- SPA routing ----
    # Serve index.html for all routes (no page reloads needed — pure JS routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Static asset caching ----
    # Cache CSS, JS, images, and fonts aggressively
    location ~* \.(css|js|png|jpg|jpeg|ico|svg|woff|woff2|ttf|gif|webp)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ---- Security headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Content Security Policy — only allow resources from trusted origins
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://flagcdn.com; connect-src 'self' https://api.worldbank.org https://restcountries.com; frame-ancestors 'none';" always;

    # ---- Gzip compression ----
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;
    gzip_min_length 1000;
    gzip_vary on;

    # ---- Access / error logs ----
    access_log /var/log/nginx/afribiz_access.log;
    error_log  /var/log/nginx/afribiz_error.log;
}
