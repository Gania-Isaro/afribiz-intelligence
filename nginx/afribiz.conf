# Nginx config for AfriBiz Intelligence
# Place at: /etc/nginx/sites-available/afribiz

server {
    listen 80;
    listen [::]:80;

    server_name _;

    root /var/www/afribiz-intelligence;
    index index.html;

    # Proxy for GNews API (avoids CORS on free tier)
    location /api/news/ {
        proxy_pass https://gnews.io/api/v4/;
        proxy_ssl_server_name on;
        proxy_set_header Host gnews.io;
        proxy_set_header User-Agent "Mozilla/5.0";
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "no-store";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache HTML or service worker
    location ~* \.(html|sw\.js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|ico|svg|woff|woff2|ttf|gif|webp)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://flagcdn.com https://*.flagcdn.com; connect-src 'self' https://api.worldbank.org https://restcountries.com https://gnews.io https://v6.exchangerate-api.com; frame-ancestors 'none';" always;

    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;
    gzip_min_length 1000;
    gzip_vary on;

    access_log /var/log/nginx/afribiz_access.log;
    error_log  /var/log/nginx/afribiz_error.log;
}
